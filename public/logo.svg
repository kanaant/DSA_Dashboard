<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glowing shadow definitions -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Color Gradients -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
  </defs>

  <!-- Dark glassmorphic circular boundary background -->
  <circle cx="50" cy="50" r="46" fill="#020617" stroke="url(#cyber-grad)" stroke-width="1.5" />

  <!-- Outer Hexagon Grid -->
  <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />

  <!-- Inner Cybernetic Hex Shield Core -->
  <polygon points="50,22 74,36 74,64 50,78 26,64 26,36" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow-cyan)" />

  <!-- The Distinct "DS" Abstract Nodes & Connections -->
  <!-- Left Curve of D -->
  <path d="M 40,36 L 40,64 C 40,64 45,67 50,64 C 55,61 55,39 50,36 C 45,33 40,36 40,36 Z" fill="none" stroke="#d946ef" stroke-width="2.5" filter="url(#glow-purple)" stroke-linecap="round" />
  
  <!-- Right Curve of S -->
  <path d="M 60,38 C 60,35 50,35 50,42 C 50,49 60,51 60,58 C 60,65 50,65 50,62" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow-cyan)" stroke-linecap="round" />

  <!-- Core Circuit Node Connection Point -->
  <circle cx="50" cy="50" r="3" fill="#ffffff" filter="url(#glow-cyan)" />
</svg>
